<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #151718; font-family: Inter, sans-serif; padding: 40px; display: flex; flex-direction: column; gap: 48px; }
  .logo-row { display: flex; align-items: center; gap: 20px; }
  .label { color: #555; font-size: 13px; width: 80px; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap');
</style>
</head>
<body>

<!-- OPTION A: Location pin + clean wordmark -->
<div class="logo-row">
  <div class="label">Option A</div>
  <svg height="44" viewBox="0 0 240 44" xmlns="http://www.w3.org/2000/svg">
    <!-- Location pin / house hybrid -->
    <circle cx="18" cy="16" r="12" fill="#4ECDC4" opacity="0.15"/>
    <circle cx="18" cy="16" r="7" fill="#4ECDC4"/>
    <circle cx="18" cy="16" r="3" fill="#151718"/>
    <line x1="18" y1="23" x2="18" y2="38" stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Wordmark -->
    <text x="40" y="30" font-family="Inter,sans-serif" font-weight="900" font-size="24" fill="white" letter-spacing="-1">Ask<tspan fill="#4ECDC4">Dwell</tspan></text>
  </svg>
</div>

<!-- OPTION B: Bold "AD" monogram -->
<div class="logo-row">
  <div class="label">Option B</div>
  <svg height="44" viewBox="0 0 240 44" xmlns="http://www.w3.org/2000/svg">
    <!-- Square mark with AD -->
    <rect x="0" y="4" width="36" height="36" rx="10" fill="#FD451E"/>
    <text x="18" y="29" font-family="Inter,sans-serif" font-weight="900" font-size="18" fill="white" text-anchor="middle">AD</text>
    <!-- Wordmark -->
    <text x="48" y="30" font-family="Inter,sans-serif" font-weight="800" font-size="22" fill="white" letter-spacing="-0.5">Ask<tspan fill="#4ECDC4">Dwell</tspan></text>
    <text x="48" y="42" font-family="Inter,sans-serif" font-weight="400" font-size="10" fill="#666" letter-spacing="2">AI PROPERTY AGENT</text>
  </svg>
</div>

<!-- OPTION C: Speech bubble mark -->
<div class="logo-row">
  <div class="label">Option C</div>
  <svg height="44" viewBox="0 0 240 44" xmlns="http://www.w3.org/2000/svg">
    <!-- Speech bubble -->
    <rect x="0" y="2" width="34" height="28" rx="8" fill="#4ECDC4"/>
    <polygon points="6,30 14,30 10,40" fill="#4ECDC4"/>
    <!-- Dots inside bubble -->
    <circle cx="9" cy="16" r="3" fill="#151718"/>
    <circle cx="17" cy="16" r="3" fill="#151718"/>
    <circle cx="25" cy="16" r="3" fill="#151718"/>
    <!-- Wordmark -->
    <text x="46" y="26" font-family="Inter,sans-serif" font-weight="900" font-size="22" fill="white" letter-spacing="-0.5">Ask<tspan fill="#4ECDC4">Dwell</tspan></text>
  </svg>
</div>

<!-- OPTION D: Minimal key/door icon -->
<div class="logo-row">
  <div class="label">Option D</div>
  <svg height="44" viewBox="0 0 240 44" xmlns="http://www.w3.org/2000/svg">
    <!-- Door/arch shape -->
    <path d="M8 40 V18 Q8 4 20 4 Q32 4 32 18 V40 Z" fill="none" stroke="#4ECDC4" stroke-width="2.5"/>
    <circle cx="28" cy="22" r="2.5" fill="#FD451E"/>
    <!-- Wordmark -->
    <text x="44" y="30" font-family="Inter,sans-serif" font-weight="900" font-size="24" fill="white" letter-spacing="-1">Ask<tspan fill="#4ECDC4">Dwell</tspan></text>
  </svg>
</div>

<!-- OPTION E: Rooftop / simplified house -->
<div class="logo-row">
  <div class="label">Option E</div>
  <svg height="44" viewBox="0 0 240 44" xmlns="http://www.w3.org/2000/svg">
    <!-- Minimal house -->
    <path d="M4 40 V22 L20 6 L36 22 V40 Z" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"/>
    <path d="M14 40 V30 H26 V40" fill="#FD451E" opacity="0.9"/>
    <!-- Wordmark -->
    <text x="48" y="30" font-family="Inter,sans-serif" font-weight="900" font-size="24" fill="white" letter-spacing="-1">Ask<tspan fill="#4ECDC4">Dwell</tspan></text>
  </svg>
</div>

</body>
</html>
